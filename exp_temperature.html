<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>温度·睡眠·心理研究</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans SC',-apple-system,sans-serif}

  /* ── 全屏背景 ── */
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden}
  #bgImg{width:100%;height:100%;object-fit:cover;filter:blur(3px) brightness(.5);transform:scale(1.08);transition:opacity 1s}
  #bgOverlay{position:absolute;inset:0}
  #bgParticles{position:absolute;inset:0;overflow:hidden;pointer-events:none}

  /* ── 顶栏 ── */
  #topbar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:52px;display:flex;align-items:center;padding:0 14px;gap:8px;
    background:rgba(0,0,0,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0
  }
  #topbarBack{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:20px;cursor:pointer;border-radius:50%;background:rgba(255,255,255,.08)}
  #topbarTitle{flex:1;text-align:center;color:#fff;font-size:15px;font-weight:600}
  #auBtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;outline:none;flex-shrink:0;
    -webkit-appearance:none}
  #pbarWrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.08)}
  #pbar{height:100%;width:0;transition:width .4s ease;background:var(--accent,#60a5fa)}

  /* ── 滚动主区 ── ★ 关键：顶部留52px给fixed topbar，html/body overflow:hidden，所以这里用 position:fixed ── */
  #scroll{
    position:fixed;top:52px;left:0;right:0;bottom:0;z-index:50;
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain
  }
  #content{max-width:560px;margin:0 auto;padding:22px 18px 72px;color:#fff;min-height:100%}

  /* ── 沉浸遮罩 ── */
  #immOverlay{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    opacity:0;pointer-events:none;transition:opacity .8s;background:rgba(0,0,0,.78)
  }
  #immTitle{font-size:clamp(26px,8vw,52px);font-weight:900;color:#fff;text-align:center;
    line-height:1.3;padding:0 24px}
  #immSub{font-size:12px;letter-spacing:4px;opacity:.88}

  /* ── 组件 ── */
  .fade-in{animation:fadeIn .7s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .ey{font-size:10px;letter-spacing:4px;opacity:.88;margin-bottom:10px}
  .h1{font-size:clamp(22px,6vw,34px);font-weight:900;color:#fff;line-height:1.3;margin-bottom:14px;
    text-shadow:0 2px 20px rgba(0,0,0,.9)}
  .pp{font-size:14px;line-height:1.9;color:rgba(255,255,255,.82);margin-bottom:14px;
    text-shadow:0 1px 8px rgba(0,0,0,.7)}

  .glass{background:rgba(0,0,0,.50);border:1px solid rgba(255,255,255,.13);border-radius:16px;
    padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);margin-bottom:14px}

  .tbtn{width:100%;padding:14px;border-radius:30px;border:1.5px solid var(--accent,#60a5fa);
    background:transparent;color:var(--accent,#60a5fa);font-size:13px;letter-spacing:2px;
    cursor:pointer;font-family:inherit;margin-top:10px;transition:background .3s,color .3s;
    -webkit-appearance:none}
  .tbtn:disabled{opacity:.2;pointer-events:none}
  .tbtn:active{background:var(--accent,#60a5fa);color:#000}

  .scrow{padding:6px 0}
  .scrow-code{font-size:10px;letter-spacing:2px;opacity:.88;margin-bottom:4px}
  .scrow-text{font-size:13px;line-height:1.65;color:rgba(255,255,255,.88);margin-bottom:8px}
  .scrow-dots{display:flex;align-items:center;gap:4px}
  .scrow-la,.scrow-ra{font-size:10px;color:rgba(255,255,255,.38);min-width:38px;line-height:1.3}
  .scrow-ra{text-align:right}
  .dot-row{display:flex;gap:3px;flex:1;justify-content:center}
  .dot{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);
    background:rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:rgba(255,255,255,.4);transition:all .18s;flex-shrink:0}
  .dot.sel{background:var(--accent);border-color:var(--accent);color:#000;transform:scale(1.2)}

  .divider{border:none;border-top:1px solid rgba(255,255,255,.09);margin:10px 0}
  .sec-label{font-size:10px;letter-spacing:2px;opacity:.84;margin-bottom:10px}

  textarea{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);
    border-radius:12px;padding:14px;color:#fff;font-family:inherit;font-size:13px;
    line-height:2;resize:vertical;min-height:150px;outline:none;-webkit-appearance:none}
  textarea::placeholder{color:rgba(255,255,255,.3)}
  textarea:focus{border-color:var(--accent)}

  .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:30px;
    font-size:12px;border:1px solid rgba(255,255,255,.2);color:#fff;margin-bottom:14px}

  /* ── 粒子 CSS ── */
  @keyframes floatUp{
    0%{transform:translateY(0) translateX(0);opacity:var(--a)}
    100%{transform:translateY(-105vh) translateX(var(--dx));opacity:0}
  }
  @keyframes snowFall{
    0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:var(--a)}
    100%{transform:translateY(105vh) translateX(var(--dx)) rotate(520deg);opacity:0}
  }
  @keyframes flicker{0%,100%{opacity:var(--a)}50%{opacity:calc(var(--a)*.3)}}
  @keyframes sway{0%,100%{margin-left:0}50%{margin-left:var(--sw)}}

  .p-heat{position:absolute;border-radius:50%;pointer-events:none;
    animation:floatUp var(--dur) var(--del) infinite linear}
  .p-snow{position:absolute;border-radius:50%;pointer-events:none;
    animation:snowFall var(--dur) var(--del) infinite linear}
  .p-fly{position:absolute;border-radius:50%;pointer-events:none;
    box-shadow:0 0 5px 2px rgba(140,255,80,.28);
    animation:flicker var(--fdur) var(--del) infinite ease-in-out,
               sway var(--sdur) var(--del) infinite ease-in-out}

  /* 倒计时圆环 */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0}
  .ring-svg{transform:rotate(-90deg);width:84px;height:84px}
  .ring-num{font-size:20px;font-weight:900}
  .ring-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px}
</style>
</head>
<body>

<!-- 背景层 -->
<div id="bg">
  <img id="bgImg" src="" alt="" loading="eager">
  <div id="bgOverlay"></div>
  <div id="bgParticles"></div>
</div>

<!-- 顶栏 -->
<div id="topbar">
  <div id="topbarBack" onclick="doClose()">✕</div>
  <div id="topbarTitle">温度·睡眠·心理研究</div>
  <button id="auBtn" onclick="tapAudio()">🔇</button>
  <div id="pbarWrap"><div id="pbar"></div></div>
</div>

<!-- 滚动主区 -->
<div id="scroll">
  <div id="content"></div>
</div>

<!-- 沉浸遮罩 -->
<div id="immOverlay">
  <div id="immTitle"></div>
  <div id="immSub"></div>
</div>

<script>
/* ════════════════════════════════════════════
   配置
════════════════════════════════════════════ */
const CONDS = [
  {id:'summer_hot', season:'summer',anomaly:+3,
   accent:'#ff8c55',overlay:'rgba(18,5,0,.55)',
   label:'盛夏·热浪之夜',badge:'🌡️ 比往年偏热约 3°C',badgeBg:'rgba(255,90,20,.18)',
   img:'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=1200&q=80&fit=crop'},

  {id:'summer_zero',season:'summer',anomaly: 0,
   accent:'#4ade80',overlay:'rgba(0,8,3,.50)',
   label:'盛夏·寻常之夜',badge:'🌿 与往年同期相近',badgeBg:'rgba(40,160,70,.18)',
   img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1465189684280-6a8fa9b19a7a?w=1200&q=80&fit=crop'},

  {id:'summer_cold',season:'summer',anomaly:-3,
   accent:'#7dd3fc',overlay:'rgba(0,5,14,.52)',
   label:'盛夏·清爽之夜',badge:'🍃 比往年偏凉约 3°C',badgeBg:'rgba(40,120,220,.18)',
   img:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200&q=80&fit=crop'},

  {id:'winter_hot', season:'winter',anomaly:+3,
   accent:'#fbbf24',overlay:'rgba(8,5,0,.52)',
   label:'隆冬·暖意之夜',badge:'☀️ 比往年偏暖约 3°C',badgeBg:'rgba(200,120,10,.18)',
   img:'https://images.unsplash.com/photo-1547036967-23d11aacaee0?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1491904768633-2b7e3e7fede5?w=1200&q=80&fit=crop'},

  {id:'winter_zero',season:'winter',anomaly: 0,
   accent:'#93c5fd',overlay:'rgba(0,3,10,.55)',
   label:'隆冬·寻常之夜',badge:'❄️ 与往年同期相近',badgeBg:'rgba(50,90,200,.18)',
   img:'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1548777123-e216912df7d8?w=1200&q=80&fit=crop'},

  {id:'winter_cold',season:'winter',anomaly:-3,
   accent:'#c4b5fd',overlay:'rgba(0,1,6,.62)',
   label:'隆冬·严寒之夜',badge:'🌨️ 比往年偏寒约 3°C',badgeBg:'rgba(30,50,180,.18)',
   img:'https://images.unsplash.com/photo-1457269449834-928af64c684d?w=1200&q=80&fit=crop',
   imgFallback:'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=1200&q=80&fit=crop'},
];

const TS_TEXT = {
  summer_hot:`现在是盛夏的一个夜晚。你结束了漫长一天，疲惫地回到家，冲了个澡，躺在床上。今天，你所在的城市气温比这个季节往年高出不少。窗缝里透进来的是依然带着余热的空气——没有想象中的凉爽。空气中弥漫着挥之不去的燥热感，身体感到黏腻不适。你闭上眼睛，试图让自己安静下来，准备入睡……`,
  summer_zero:`现在是盛夏的一个夜晚。你结束了一天的工作，回到家，洗漱完毕，躺在床上。今天的气温与这个季节往年大致相同，窗外传来夏夜熟悉的声音——蟋蟀的鸣叫，远处偶尔的车声。你闭上眼睛，感受着这个寻常的夏夜，让身体慢慢放松，准备入睡……`,
  summer_cold:`现在是盛夏的一个夜晚。你结束了一天的工作，回到家，躺在床上。今天的气温比这个季节往年低了不少，带着意外的清爽。空气清新，夜风中带着难得的凉意，让你感到格外舒适。你闭上眼睛，感受着这个不寻常的清爽夏夜，慢慢沉入睡意……`,
  winter_hot:`现在是隆冬的一个夜晚。你结束了一天的工作，回到家，钻进被窝。今天，你所在的城市气温比冬天往年高出不少——窗外没有预想中的严寒，反而透着一丝暖意。你闭上眼睛，感受着这个比往年暖和的冬夜，让思绪慢慢平息，进入睡眠……`,
  winter_zero:`现在是隆冬的一个夜晚。你结束了一天的工作，回到家，钻进温暖的被窝。今天的气温与冬天往年大致相同，窗外是熟悉的冬夜寂静，偶有风声。你闭上眼睛，蜷缩在被窝里，感受着外面的寒冷和被窝里的温暖，慢慢沉入梦乡……`,
  winter_cold:`现在是隆冬的一个夜晚。你结束了一天的工作，裹紧大衣回到家，迫不及待地钻进被窝。今天，你所在的城市气温比往年这个时候低了不少，窗外的风声格外凛冽，窗缝里渗进来的寒气让你把自己裹得更紧。你闭上眼睛，感受着这个格外寒冷的冬夜，试图让自己平静下来……`,
};

/* ════════════════════════════════════════════
   初始化
════════════════════════════════════════════ */
let COND, auEl=null, cdTimer=null, tsD={}, tsV={};

function init(){
  // 分配条件（均衡随机）
  const cnt = JSON.parse(localStorage.getItem('ts_cc')||'{}');
  const mn  = Math.min(...CONDS.map(c=>cnt[c.id]||0));
  const pool= CONDS.filter(c=>(cnt[c.id]||0)===mn);
  COND = pool[Math.floor(Math.random()*pool.length)];

  // 设置 CSS 变量 accent
  document.documentElement.style.setProperty('--accent', COND.accent);

  // 背景颜色兜底
  document.getElementById('bgOverlay').style.background = COND.overlay;

  // 加载背景图
  loadImg();

  // 粒子
  buildParticles();

  tsD = {condition:COND.id, season:COND.season, anomaly:COND.anomaly};
  screen0();
}

/* ════════════════════════════════════════════
   背景图
════════════════════════════════════════════ */
function loadImg(){
  const el = document.getElementById('bgImg');
  el.onerror = () => { el.src = COND.imgFallback; };
  el.src = COND.img;
}

/* ════════════════════════════════════════════
   粒子系统（纯CSS，不影响滚动）
════════════════════════════════════════════ */
function buildParticles(){
  const box = document.getElementById('bgParticles');
  let html = '';
  const id = COND.id;

  if(id === 'summer_hot'){
    // 热气泡 45个，橙红色
    for(let i=0;i<45;i++){
      const x=Math.random()*100, sz=6+Math.random()*30,
            dur=5+Math.random()*10, del=Math.random()*12,
            dx=(Math.random()-.5)*100, a=.10+Math.random()*.18,
            r=Math.floor(220+Math.random()*35), g=Math.floor(60+Math.random()*80);
      html+=`<div class="p-heat" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(${r},${g},20,${a}),transparent);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  } else if(id === 'summer_zero'){
    // 萤火虫 30个
    for(let i=0;i<30;i++){
      const x=Math.random()*92, y=15+Math.random()*72,
            sz=3+Math.random()*6, fdur=1.2+Math.random()*2.5,
            sdur=2.5+Math.random()*5, del=Math.random()*6, a=.45+Math.random()*.55,
            sw=(Math.random()-.5)*50;
      html+=`<div class="p-fly" style="left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;
        background:rgba(150,255,90,${a});
        --a:${a};--fdur:${fdur}s;--sdur:${sdur}s;--del:-${del}s;--sw:${sw}px"></div>`;
    }
  } else if(id === 'summer_cold'){
    // 淡蓝绿浮粒 20个
    for(let i=0;i<20;i++){
      const x=Math.random()*100, sz=4+Math.random()*14,
            dur=8+Math.random()*14, del=Math.random()*12,
            dx=(Math.random()-.5)*60, a=.08+Math.random()*.14;
      html+=`<div class="p-heat" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(100,200,255,${a}),transparent);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  } else if(id === 'winter_cold'){
    // 雪花 80个
    for(let i=0;i<80;i++){
      const x=Math.random()*100, sz=1.5+Math.random()*7,
            dur=5+Math.random()*14, del=Math.random()*18,
            dx=(Math.random()-.5)*130, a=.35+Math.random()*.6;
      html+=`<div class="p-snow" style="left:${x}%;top:-${sz}px;width:${sz}px;height:${sz}px;
        background:rgba(215,230,255,${a});
        --a:${a};--dur:${dur}s;--del:-${del}s;--dx:${dx}px"></div>`;
    }
  } else if(id === 'winter_zero'){
    // 轻雪 35个
    for(let i=0;i<35;i++){
      const x=Math.random()*100, sz=1.5+Math.random()*4.5,
            dur=8+Math.random()*18, del=Math.random()*22,
            dx=(Math.random()-.5)*90, a=.2+Math.random()*.38;
      html+=`<div class="p-snow" style="left:${x}%;top:-${sz}px;width:${sz}px;height:${sz}px;
        background:rgba(200,220,255,${a});
        --a:${a};--dur:${dur}s;--del:-${del}s;--dx:${dx}px"></div>`;
    }
  } else {
    // winter_hot：极少粒子+暖色调
    for(let i=0;i<15;i++){
      const x=Math.random()*100, sz=3+Math.random()*8,
            dur=12+Math.random()*20, del=Math.random()*20,
            dx=(Math.random()-.5)*40, a=.06+Math.random()*.10;
      html+=`<div class="p-heat" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(255,200,100,${a}),transparent);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  }
  box.innerHTML = html;
}

/* ════════════════════════════════════════════
   音频（<audio> 标签，真实环境音）
════════════════════════════════════════════ */
// 每个条件提供3个备选链接，按顺序尝试
const AUDIO_SRCS = {
  summer_hot:[
    'https://cdn.freesound.org/previews/514/514506_11067970-lq.mp3',
    'https://cdn.freesound.org/previews/388/388713_3408533-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-summer-day-nature-ambience-2931.mp3',
  ],
  summer_zero:[
    'https://cdn.freesound.org/previews/522/522298_10891355-lq.mp3',
    'https://cdn.freesound.org/previews/419/419988_5121236-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-crickets-and-insects-in-the-wild-ambience-39.mp3',
  ],
  summer_cold:[
    'https://cdn.freesound.org/previews/524/524516_11067970-lq.mp3',
    'https://cdn.freesound.org/previews/346/346642_5121236-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-night-in-the-forest-ambience-159.mp3',
  ],
  winter_hot:[
    'https://cdn.freesound.org/previews/476/476178_6893798-lq.mp3',
    'https://cdn.freesound.org/previews/462/462090_9337855-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-light-wind-ambience-1166.mp3',
  ],
  winter_zero:[
    'https://cdn.freesound.org/previews/346/346640_5121236-lq.mp3',
    'https://cdn.freesound.org/previews/361/361228_5121236-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-cold-winter-wind-loop-1154.mp3',
  ],
  winter_cold:[
    'https://cdn.freesound.org/previews/462/462087_9337855-lq.mp3',
    'https://cdn.freesound.org/previews/458/458520_9337855-lq.mp3',
    'https://assets.mixkit.co/sfx/preview/mixkit-blizzard-cold-winds-1153.mp3',
  ],
};

let _auIdx=0;
function tryNextSrc(){
  const srcs = AUDIO_SRCS[COND.id] || [];
  if(_auIdx >= srcs.length) return;
  auEl.src = srcs[_auIdx++];
  auEl.load();
  auEl.play().catch(()=>{});
}

function playAudio(){
  stopAudio();
  _auIdx=0;
  auEl = document.createElement('audio');
  auEl.loop = true; auEl.volume = 0;
  auEl.onerror = ()=>tryNextSrc();
  auEl.oncanplaythrough = ()=>{
    // 渐入音量
    let v=0;
    const t=setInterval(()=>{
      v=Math.min(v+.05,.55); auEl.volume=v;
      if(v>=.55) clearInterval(t);
    },80);
  };
  document.body.appendChild(auEl);
  tryNextSrc();
  document.getElementById('auBtn').textContent='🔊';
}

function stopAudio(){
  if(auEl){ auEl.pause(); auEl.src=''; auEl.remove(); auEl=null; }
  document.getElementById('auBtn').textContent='🔇';
}

function tapAudio(){
  if(auEl&&!auEl.paused) stopAudio(); else playAudio();
}

function buildScale(id, nextBtnId, allIds){
  const row = document.getElementById('scr-'+id);
  if(!row) return;
  const dotRow = row.querySelector('.dot-row');
  for(let i=1;i<=7;i++){
    const d=document.createElement('div');
    d.className='dot'; d.textContent=i; d.dataset.id=id; d.dataset.v=i;
    d.onclick=()=>{
      row.querySelectorAll('.dot').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel');
      tsV[id]=i; tsD[id]=i;
      // 检查全部选完
      if(allIds.every(x=>tsV[x]!==undefined)){
        const btn=document.getElementById(nextBtnId);
        if(btn) btn.disabled=false;
      }
    };
    dotRow.appendChild(d);
  }
}

function scRowHtml(id, code, text, la, ra){
  return `<div class="scrow" id="scr-${id}">
    <div class="scrow-code" style="color:var(--accent)">${code}</div>
    <div class="scrow-text">${text}</div>
    <div class="scrow-dots">
      <span class="scrow-la">${la}</span>
      <div class="dot-row"></div>
      <span class="scrow-ra">${ra}</span>
    </div>
  </div>`;
}

function startCd(secs){
  clearInterval(cdTimer);
  let left=secs;
  const C=2*Math.PI*42;
  cdTimer=setInterval(()=>{

    if(left<=0){clearInterval(cdTimer); if(el)el.textContent='完成';}
  },1000);
}

/* ════════════════════════════════════════════
   保存结果
════════════════════════════════════════════ */
async function saveResult(){
  // 更新条件计数
  const cnt=JSON.parse(localStorage.getItem('ts_cc')||'{}');
  cnt[COND.id]=(cnt[COND.id]||0)+1;
  localStorage.setItem('ts_cc',JSON.stringify(cnt));
  // 发送到后端
  try{
    const token=localStorage.getItem('token')||'';
    await fetch('/api/experiments/result',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({experiment_type:'temperature',result:tsD,timestamp:tsD.timestamp})
    });
  }catch(e){ console.log('[Exp] offline save'); }
}
