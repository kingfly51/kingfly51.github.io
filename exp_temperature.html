<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>温度·睡眠·心理研究</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{height:100%}
body{
  height:100%;
  overflow:hidden;
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--bg,#06080f);
  color:#fff;
}

/* ── 粒子背景（纯CSS，无图片）── */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

/* ── 顶栏（fixed，高度 52px）── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;
  display:flex;align-items:center;padding:0 14px;gap:8px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.07);
}
#topbarBack{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.09);border:none;
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;outline:none;
}
#topbarTitle{flex:1;text-align:center;font-size:15px;font-weight:600}
#auBtn{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;outline:none;
}
#pbarTrack{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.07)}
#pbar{height:100%;width:0%;background:var(--accent,#60a5fa);transition:width .4s}

/* ══════════════════════════════════════════
   ★ 滚动区核心 ★
   position:fixed 独立建立滚动上下文，
   top=52px(topbar高度)，
   bottom = env(safe-area-inset-bottom) 兜底，
   不依赖任何父级 overflow
══════════════════════════════════════════ */
#scroll{
  position:fixed;
  top:52px;
  left:0;right:0;
  bottom:0;
  bottom:env(safe-area-inset-bottom,0px);
  z-index:50;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
/* 内容区：底部 padding 足够大，确保最后元素不被遮 */
#content{
  max-width:560px;
  margin:0 auto;
  padding:22px 18px 100px;
  min-height:100%;
}

/* ── 沉浸遮罩 ── */
#immOverlay{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  opacity:0;pointer-events:none;
  transition:opacity .7s;
  background:rgba(0,0,0,.82);
}

/* ── 组件 ── */
.fade-in{animation:fadeIn .6s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.ey{font-size:10px;letter-spacing:4px;color:var(--accent);opacity:.9;margin-bottom:10px}
.h1{font-size:clamp(22px,6vw,32px);font-weight:900;line-height:1.3;margin-bottom:12px}
.pp{font-size:14px;line-height:1.9;color:rgba(255,255,255,.78);margin-bottom:12px}

.glass{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:18px;margin-bottom:14px;
}

.tbtn{
  display:block;width:100%;padding:14px;
  border-radius:30px;
  border:1.5px solid var(--accent,#60a5fa);
  background:transparent;color:var(--accent,#60a5fa);
  font-size:13px;letter-spacing:2px;
  cursor:pointer;font-family:inherit;
  margin-top:12px;outline:none;
  transition:background .25s,color .25s;
  -webkit-appearance:none;
}
.tbtn:disabled{opacity:.22;pointer-events:none}
.tbtn:not(:disabled):active{background:var(--accent);color:#000}

.divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:10px 0}
.sec-lbl{font-size:10px;letter-spacing:2px;color:var(--accent);margin-bottom:10px}

/* 量表 */
.scrow{padding:7px 0}
.sc-code{font-size:10px;letter-spacing:2px;color:var(--accent);opacity:.9;margin-bottom:4px}
.sc-text{font-size:13px;line-height:1.65;color:rgba(255,255,255,.88);margin-bottom:9px}
.sc-dots{display:flex;align-items:center;gap:4px}
.sc-la,.sc-ra{font-size:10px;color:rgba(255,255,255,.35);min-width:38px;line-height:1.3;flex-shrink:0}
.sc-ra{text-align:right}
.dot-row{display:flex;gap:3px;flex:1;justify-content:center}
.dot{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:rgba(255,255,255,.38);
  transition:all .16s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.dot.sel{
  background:var(--accent);border-color:var(--accent);
  color:#000;transform:scale(1.18);
}

textarea{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:14px;
  color:#fff;font-family:inherit;font-size:13px;
  line-height:2;resize:vertical;min-height:140px;
  outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
textarea::placeholder{color:rgba(255,255,255,.28)}
textarea:focus{border-color:var(--accent)}

/* 倒计时环 */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0}
.ring-svg{transform:rotate(-90deg);width:80px;height:80px}
.ring-num{font-size:19px;font-weight:900;color:var(--accent)}
.ring-lbl{font-size:10px;color:rgba(255,255,255,.38);letter-spacing:2px}

/* 徽章 */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:30px;font-size:12px;
  border:1px solid rgba(255,255,255,.18);
  background:var(--badge-bg,rgba(255,255,255,.06));
  margin-bottom:14px;
}

/* ── 粒子动画 ── */
@keyframes floatUp{
  0%  {transform:translateY(0) translateX(0);opacity:var(--a)}
  100%{transform:translateY(-110vh) translateX(var(--dx));opacity:0}
}
@keyframes snowFall{
  0%  {transform:translateY(-8px) translateX(0) rotate(0deg);opacity:var(--a)}
  100%{transform:translateY(108vh) translateX(var(--dx)) rotate(480deg);opacity:0}
}
@keyframes flicker{0%,100%{opacity:var(--a)}50%{opacity:calc(var(--a)*.25)}}
@keyframes sway{0%,100%{transform:translateX(0)}50%{transform:translateX(var(--sw,20px))}}

.p-up  {position:absolute;border-radius:50%;pointer-events:none;animation:floatUp var(--dur) var(--del) infinite linear}
.p-snow{position:absolute;border-radius:50%;pointer-events:none;animation:snowFall var(--dur) var(--del) infinite linear}
.p-fly {position:absolute;border-radius:50%;pointer-events:none;
        animation:flicker var(--fdur) var(--del) infinite ease-in-out,
                   sway var(--sdur) var(--del) infinite ease-in-out}
</style>
</head>
<body>

<div id="particles"></div>

<div id="topbar">
  <button id="topbarBack" onclick="doClose()">✕</button>
  <div id="topbarTitle">温度·睡眠·心理研究</div>
  <button id="auBtn" onclick="tapAudio()">🔇</button>
  <div id="pbarTrack"><div id="pbar"></div></div>
</div>

<div id="scroll">
  <div id="content"></div>
</div>

<div id="immOverlay">
  <div id="immTitle" style="font-size:clamp(24px,7vw,48px);font-weight:900;text-align:center;line-height:1.3;padding:0 24px"></div>
  <div id="immSub"   style="font-size:12px;letter-spacing:4px;color:var(--accent)"></div>
</div>

<script>
/* ══════════════════════════════════════════
   条件配置
══════════════════════════════════════════ */
const CONDS = [
  {id:'summer_hot',  season:'summer', anomaly:+3,
   accent:'#ff8c55', bg:'#0e0501', badgeBg:'rgba(255,80,10,.15)',
   label:'盛夏·热浪之夜', badge:'🌡️ 比往年偏热约 3°C'},
  {id:'summer_zero', season:'summer', anomaly: 0,
   accent:'#4ade80', bg:'#020d05', badgeBg:'rgba(30,150,60,.15)',
   label:'盛夏·寻常之夜', badge:'🌿 与往年同期相近'},
  {id:'summer_cold', season:'summer', anomaly:-3,
   accent:'#7dd3fc', bg:'#030810', badgeBg:'rgba(30,110,220,.15)',
   label:'盛夏·清爽之夜', badge:'🍃 比往年偏凉约 3°C'},
  {id:'winter_hot',  season:'winter', anomaly:+3,
   accent:'#fbbf24', bg:'#090500', badgeBg:'rgba(200,110,10,.15)',
   label:'隆冬·暖意之夜', badge:'☀️ 比往年偏暖约 3°C'},
  {id:'winter_zero', season:'winter', anomaly: 0,
   accent:'#93c5fd', bg:'#020510', badgeBg:'rgba(40,80,200,.15)',
   label:'隆冬·寻常之夜', badge:'❄️ 与往年同期相近'},
  {id:'winter_cold', season:'winter', anomaly:-3,
   accent:'#c4b5fd', bg:'#010208', badgeBg:'rgba(20,40,170,.15)',
   label:'隆冬·严寒之夜', badge:'🌨️ 比往年偏寒约 3°C'},
];

const TS_TEXT = {
  summer_hot: '现在是盛夏的一个夜晚。你结束了漫长一天，疲惫地回到家，冲了个澡，躺在床上。今天，你所在的城市气温比这个季节往年高出不少。窗缝里透进来的是依然带着余热的空气——没有想象中的凉爽。空气中弥漫着挥之不去的燥热感，身体感到黏腻不适。你闭上眼睛，试图让自己安静下来，准备入睡……',
  summer_zero:'现在是盛夏的一个夜晚。你结束了一天的工作，回到家，洗漱完毕，躺在床上。今天的气温与这个季节往年大致相同，窗外传来夏夜熟悉的声音——蟋蟀的鸣叫，远处偶尔的车声。你闭上眼睛，感受着这个寻常的夏夜，让身体慢慢放松，准备入睡……',
  summer_cold:'现在是盛夏的一个夜晚。你结束了一天的工作，回到家，躺在床上。今天的气温比这个季节往年低了不少，带着意外的清爽。空气清新，夜风中带着难得的凉意，让你感到格外舒适。你闭上眼睛，感受着这个不寻常的清爽夏夜，慢慢沉入睡意……',
  winter_hot: '现在是隆冬的一个夜晚。你结束了一天的工作，回到家，钻进被窝。今天，你所在的城市气温比冬天往年高出不少——窗外没有预想中的严寒，反而透着一丝暖意。你闭上眼睛，感受着这个比往年暖和的冬夜，让思绪慢慢平息，进入睡眠……',
  winter_zero:'现在是隆冬的一个夜晚。你结束了一天的工作，回到家，钻进温暖的被窝。今天的气温与冬天往年大致相同，窗外是熟悉的冬夜寂静，偶有风声。你闭上眼睛，蜷缩在被窝里，感受着外面的寒冷和被窝里的温暖，慢慢沉入梦乡……',
  winter_cold:'现在是隆冬的一个夜晚。你结束了一天的工作，裹紧大衣回到家，迫不及待地钻进被窝。今天，你所在的城市气温比往年这个时候低了不少，窗外的风声格外凛冽，窗缝里渗进来的寒气让你把自己裹得更紧。你闭上眼睛，感受着这个格外寒冷的冬夜，试图让自己平静下来……',
};

/* ══════════════════════════════════════════
   初始化
══════════════════════════════════════════ */
let COND, auEl=null, cdTimer=null, tsD={}, tsV={};

function init(){
  // 均衡随机分配条件
  const cnt = JSON.parse(localStorage.getItem('ts_cc')||'{}');
  const mn  = Math.min(...CONDS.map(c=>cnt[c.id]||0));
  const pool= CONDS.filter(c=>(cnt[c.id]||0)===mn);
  COND = pool[Math.floor(Math.random()*pool.length)];

  // 应用主题色 & 背景色
  document.documentElement.style.setProperty('--accent', COND.accent);
  document.documentElement.style.setProperty('--bg', COND.bg);
  document.body.style.background = COND.bg;

  // 绘制纯CSS粒子
  buildParticles();

  tsD = {condition:COND.id, season:COND.season, anomaly:COND.anomaly};
  screen0();
}

/* ══════════════════════════════════════════
   粒子（纯CSS，无图片，无Canvas）
══════════════════════════════════════════ */
function buildParticles(){
  const box = document.getElementById('particles');
  let html = '';
  const id  = COND.id;

  if(id==='summer_hot'){
    // 橙红热气泡 50个
    for(let i=0;i<50;i++){
      const x=Math.random()*100, sz=5+Math.random()*28,
            dur=5+Math.random()*9, del=Math.random()*12,
            dx=(Math.random()-.5)*80, a=.09+Math.random()*.16,
            r=200+~~(Math.random()*55), g=50+~~(Math.random()*80);
      html+=`<div class="p-up" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(${r},${g},15,${a+.04}),transparent 70%);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  } else if(id==='summer_zero'){
    // 萤火虫 35个
    for(let i=0;i<35;i++){
      const x=Math.random()*92, y=10+Math.random()*78,
            sz=2.5+Math.random()*5.5, fdur=1.2+Math.random()*2.2,
            sdur=2.5+Math.random()*5, del=Math.random()*7, a=.5+Math.random()*.5,
            sw=(Math.random()-.5)*56;
      html+=`<div class="p-fly" style="left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;
        background:rgba(140,255,80,${a});box-shadow:0 0 5px 2px rgba(100,240,60,.3);
        --a:${a};--fdur:${fdur}s;--sdur:${sdur}s;--del:-${del}s;--sw:${sw}px"></div>`;
    }
  } else if(id==='summer_cold'){
    // 淡蓝绿浮粒 22个
    for(let i=0;i<22;i++){
      const x=Math.random()*100, sz=4+Math.random()*12,
            dur=9+Math.random()*14, del=Math.random()*14,
            dx=(Math.random()-.5)*55, a=.07+Math.random()*.12;
      html+=`<div class="p-up" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(80,190,255,${a+.03}),transparent 70%);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  } else if(id==='winter_cold'){
    // 密集雪花 90个
    for(let i=0;i<90;i++){
      const x=Math.random()*100, sz=1.5+Math.random()*6,
            dur=5+Math.random()*13, del=Math.random()*20,
            dx=(Math.random()-.5)*130, a=.3+Math.random()*.65;
      html+=`<div class="p-snow" style="left:${x}%;top:-${sz}px;width:${sz}px;height:${sz}px;
        background:rgba(210,228,255,${a});
        --a:${a};--dur:${dur}s;--del:-${del}s;--dx:${dx}px"></div>`;
    }
  } else if(id==='winter_zero'){
    // 稀疏雪花 40个
    for(let i=0;i<40;i++){
      const x=Math.random()*100, sz=1+Math.random()*4,
            dur=9+Math.random()*18, del=Math.random()*25,
            dx=(Math.random()-.5)*90, a=.18+Math.random()*.35;
      html+=`<div class="p-snow" style="left:${x}%;top:-${sz}px;width:${sz}px;height:${sz}px;
        background:rgba(200,218,255,${a});
        --a:${a};--dur:${dur}s;--del:-${del}s;--dx:${dx}px"></div>`;
    }
  } else {
    // winter_hot：极少暖粒 16个
    for(let i=0;i<16;i++){
      const x=Math.random()*100, sz=3+Math.random()*8,
            dur=12+Math.random()*20, del=Math.random()*22,
            dx=(Math.random()-.5)*40, a=.05+Math.random()*.09;
      html+=`<div class="p-up" style="left:${x}%;bottom:-${sz}px;width:${sz}px;height:${sz}px;
        background:radial-gradient(circle,rgba(255,190,80,${a+.02}),transparent 70%);
        --dur:${dur}s;--del:-${del}s;--dx:${dx}px;--a:${a}"></div>`;
    }
  }
  box.innerHTML = html;
}

/* ══════════════════════════════════════════
   音频
══════════════════════════════════════════ */
const AUDIO_SRCS = {
  summer_hot: [
    'https://cdn.freesound.org/previews/514/514506_11067970-lq.mp3',
    'https://cdn.freesound.org/previews/388/388713_3408533-lq.mp3',
  ],
  summer_zero:[
    'https://cdn.freesound.org/previews/522/522298_10891355-lq.mp3',
    'https://cdn.freesound.org/previews/419/419988_5121236-lq.mp3',
  ],
  summer_cold:[
    'https://cdn.freesound.org/previews/524/524516_11067970-lq.mp3',
    'https://cdn.freesound.org/previews/346/346642_5121236-lq.mp3',
  ],
  winter_hot: [
    'https://cdn.freesound.org/previews/476/476178_6893798-lq.mp3',
    'https://cdn.freesound.org/previews/462/462090_9337855-lq.mp3',
  ],
  winter_zero:[
    'https://cdn.freesound.org/previews/346/346640_5121236-lq.mp3',
    'https://cdn.freesound.org/previews/361/361228_5121236-lq.mp3',
  ],
  winter_cold:[
    'https://cdn.freesound.org/previews/462/462087_9337855-lq.mp3',
    'https://cdn.freesound.org/previews/458/458520_9337855-lq.mp3',
  ],
};
let _auIdx=0;

function playAudio(){
  stopAudio();
  _auIdx=0;
  auEl=document.createElement('audio');
  auEl.loop=true; auEl.volume=0;
  document.body.appendChild(auEl);
  auEl.onerror=()=>{ _auIdx++; const s=AUDIO_SRCS[COND.id]; if(s&&_auIdx<s.length){auEl.src=s[_auIdx];auEl.load();auEl.play().catch(()=>{});} };
  auEl.oncanplaythrough=()=>{ let v=0; const t=setInterval(()=>{ v=Math.min(v+.04,.5); auEl.volume=v; if(v>=.5)clearInterval(t); },80); };
  const srcs=AUDIO_SRCS[COND.id]||[];
  if(srcs.length){ auEl.src=srcs[0]; auEl.load(); auEl.play().catch(()=>{}); }
  document.getElementById('auBtn').textContent='🔊';
}
function stopAudio(){
  if(auEl){ auEl.pause(); auEl.src=''; try{auEl.remove();}catch(e){} auEl=null; }
  document.getElementById('auBtn').textContent='🔇';
}
function tapAudio(){
  if(auEl&&!auEl.paused) stopAudio(); else playAudio();
}

/* ══════════════════════════════════════════
   关闭
══════════════════════════════════════════ */
function doClose(){
  stopAudio();
  clearInterval(cdTimer);
  if(window.parent&&window.parent!==window)
    window.parent.postMessage({type:'closeExp'},'*');
}

/* ══════════════════════════════════════════
   进度条 & 滚动
══════════════════════════════════════════ */
function setPbar(n,t){ document.getElementById('pbar').style.width=(n/t*100)+'%'; }
function goTop(){ document.getElementById('scroll').scrollTop=0; }

/* ══════════════════════════════════════════
   沉浸遮罩
══════════════════════════════════════════ */
function showImm(){
  const ov=document.getElementById('immOverlay');
  document.getElementById('immTitle').textContent=COND.label;
  document.getElementById('immSub').textContent=COND.badge;
  ov.style.pointerEvents='all'; ov.style.opacity='1';
  setTimeout(()=>{ov.style.opacity='0';setTimeout(()=>{ov.style.pointerEvents='none';},700);},2500);
}

/* ══════════════════════════════════════════
   量表
══════════════════════════════════════════ */
function scHtml(id,code,text,la,ra){
  return`<div class="scrow" id="scr-${id}">
    <div class="sc-code">${code}</div>
    <div class="sc-text">${text}</div>
    <div class="sc-dots">
      <span class="sc-la">${la}</span>
      <div class="dot-row" id="dr-${id}"></div>
      <span class="sc-ra">${ra}</span>
    </div>
  </div>`;
}

function buildScales(ids, nextId){
  ids.forEach(id=>{
    const row=document.getElementById('dr-'+id);
    if(!row)return;
    for(let i=1;i<=7;i++){
      const d=document.createElement('div');
      d.className='dot'; d.textContent=i;
      d.onclick=()=>{
        document.querySelectorAll('#dr-'+id+' .dot').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        tsV[id]=i; tsD[id]=i;
        if(ids.every(x=>tsV[x]!==undefined)){
          const btn=document.getElementById(nextId);
          if(btn) btn.disabled=false;
        }
      };
      row.appendChild(d);
    }
  });
}

function onMono(){
  const t=document.getElementById('mono').value;
  const n=t.replace(/\s/g,'').length;
  const cc=document.getElementById('monoC');
  if(cc){cc.textContent=n+' 字';cc.style.color=n>=150?'#86efac':'rgba(255,255,255,.3)';}
  const btn=document.getElementById('btn2');
  if(btn){btn.disabled=n<150; tsD.monologue=t;}
}

function startCd(secs){
  clearInterval(cdTimer);
  let left=secs;
  const total=2*Math.PI*42;
  cdTimer=setInterval(()=>{
    left--;
    const el=document.getElementById('cdNum'),arc=document.getElementById('arc');
    if(el) el.textContent=Math.floor(left/60)+':'+(left%60<10?'0':'')+left%60;
    if(arc) arc.style.strokeDashoffset=total*(left/secs);
    if(left<=0){clearInterval(cdTimer);if(el)el.textContent='完成';}
  },1000);
}

══════════════════════════════════════════ */
async function saveResult(){
  const cnt=JSON.parse(localStorage.getItem('ts_cc')||'{}');
  cnt[COND.id]=(cnt[COND.id]||0)+1;
  localStorage.setItem('ts_cc',JSON.stringify(cnt));
  try{
    const tok=localStorage.getItem('token')||'';
    await fetch('/api/experiments/result',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({experiment_type:'temperature',result:tsD,timestamp:tsD.timestamp})
    });
  }catch(e){console.log('[Exp] offline');}
}
